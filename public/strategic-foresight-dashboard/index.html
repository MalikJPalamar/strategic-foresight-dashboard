function StrategicQuadrant({bizId}){
const [hov,setHov]=useState(null);
const moves=MOVES[bizId];
const S=380,P=44,inner=S-P*2;
const toXY=(x,y)=>({cx:P+(x/100)*inner,cy:P+((100-y)/100)*inner});
const qc={Q1:C.gold,Q2:C.green,Q3:C.blue,Q4:C.muted};
const hm=moves.find(m=>m.id===hov);
return(
<div style={{display:“flex”,gap:20,flexWrap:“wrap”}}>
<div>
<svg width={S} height={S} style={{display:“block”}}>
<rect x={P+inner/2} y={P} width={inner/2} height={inner/2} fill={`${C.gold}08`}/>
<rect x={P} y={P} width={inner/2} height={inner/2} fill={`${C.green}08`}/>
<rect x={P+inner/2} y={P+inner/2} width={inner/2} height={inner/2} fill={`${C.blue}08`}/>
<rect x={P} y={P+inner/2} width={inner/2} height={inner/2} fill={`${C.muted}04`}/>
<line x1={P} y1={P+inner/2} x2={P+inner} y2={P+inner/2} stroke={C.border} strokeWidth={1}/>
<line x1={P+inner/2} y1={P} x2={P+inner/2} y2={P+inner} stroke={C.border} strokeWidth={1}/>
<text x={P+inner/2} y={S-8} textAnchor="middle" fill={C.muted} fontSize={9} fontFamily={C.mono}>← SLOW · FAST TO EXECUTE →</text>
<text x={12} y={P+inner/2} textAnchor=“middle” fill={C.muted} fontSize={9} fontFamily={C.mono} transform={`rotate(-90,12,${P+inner/2})`}>← LOW IMPACT · HIGH IMPACT →</text>
{[{tx:P+inner*.75,ty:P+14,l:“Q1 LOW HANGING FRUIT”,c:C.gold},{tx:P+inner*.25,ty:P+14,l:“Q2 BIG BETS”,c:C.green},
{tx:P+inner*.75,ty:P+inner/2+14,l:“Q3 QUICK WINS”,c:C.blue},{tx:P+inner*.25,ty:P+inner/2+14,l:“Q4 DEFER”,c:C.muted}]
.map((q,i)=><text key={i} x={q.tx} y={q.ty} textAnchor="middle" fill={q.c} fontSize={8} fontFamily={C.mono} opacity={0.7}>{q.l}</text>)}
{moves.map(m=>{const{cx,cy}=toXY(m.x,m.y);const col=qc[m.q];const ih=hov===m.id;
return(<g key={m.id} onMouseEnter={()=>setHov(m.id)} onMouseLeave={()=>setHov(null)} style={{cursor:“pointer”}}>
<circle cx={cx} cy={cy} r={ih?23:18} fill={`${col}22`} stroke={col} strokeWidth={ih?2:1}/>
<text x={cx} y={cy-3} textAnchor="middle" fill={col} fontSize={11} fontWeight="800" fontFamily={C.mono}>{m.id}</text>
<text x={cx} y={cy+8} textAnchor="middle" fill={col} fontSize={7} fontFamily={C.mono}>{m.q}</text>
</g>);})}
</svg>
</div>
<div style={{flex:1,minWidth:250}}>
{hm?(
<div style={{background:C.surface,border:`1px solid ${qc[hm.q]}55`,borderRadius:8,padding:16}}>
<div style={{display:“flex”,gap:8,marginBottom:10,flexWrap:“wrap”}}>

<Tag c={C.amber} bg={C.amberD}>{hm.tag}</Tag>
</div>
<div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:8}}>{hm.title}</div>
<div style={{fontSize:10,color:C.muted,fontFamily:C.mono,marginBottom:6,textTransform:“uppercase”}}>EXISTING ASSET</div>
<div style={{fontSize:12,color:C.blue,background:C.blueD,borderRadius:4,padding:“6px 10px”,marginBottom:12,lineHeight:1.5}}>{hm.asset}</div>
<div style={{fontSize:10,color:C.muted,fontFamily:C.mono,marginBottom:6,textTransform:“uppercase”}}>THE MOVE</div>
<div style={{fontSize:12,color:C.sub,lineHeight:1.7,marginBottom:12}}>{hm.move}</div>
<div style={{borderLeft:`3px solid ${qc[hm.q]}`,paddingLeft:10}}>
<div style={{fontSize:10,color:C.muted,fontFamily:C.mono,marginBottom:4,textTransform:“uppercase”}}>WHY NOW</div>
<div style={{fontSize:12,color:qc[hm.q],lineHeight:1.6}}>{hm.why}</div>
</div>
</div>
):(
<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16}}>
<SL>Hover a bubble → see full move detail</SL>
{moves.map(m=>{const col=qc[m.q];return(
<div key={m.id} onMouseEnter={()=>setHov(m.id)} onMouseLeave={()=>setHov(null)}
style={{display:“flex”,gap:10,alignItems:“flex-start”,padding:“8px 10px”,marginBottom:6,
background:`${col}08`,border:`1px solid ${col}33`,borderRadius:6,cursor:“pointer”}}>
<span style={{fontSize:12,fontWeight:800,color:col,fontFamily:C.mono,minWidth:24}}>{m.id}</span>
<div>
<div style={{fontSize:11,fontWeight:700,color:C.text}}>{m.title}</div>
<div style={{fontSize:10,color:C.sub}}>{m.tag}</div>
</div>
</div>
);})}
</div>
)}
</div>
</div>
);}
